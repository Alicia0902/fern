// ── Utils
const today = new Date();
const todayISO = today.toISOString().split('T')[0];

function addDays(iso, days) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}
function fmtDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function daysUntil(iso) {
  const t = new Date(todayISO + 'T00:00:00').getTime();
  const d = new Date(iso + 'T00:00:00').getTime();
  return Math.round((d - t) / 86400000);
}
function dayLabel(iso) {
  const n = daysUntil(iso);
  if (n < 0) return `${-n}d overdue`;
  if (n === 0) return 'today';
  if (n === 1) return 'tomorrow';
  return `in ${n}d`;
}
function withMe(iso) {
  const d1 = new Date(iso).getTime();
  const d2 = today.getTime();
  const days = Math.round((d2 - d1) / 86400000);
  if (days > 365) return `${(days/365).toFixed(1)}y`;
  if (days > 30) return `${Math.round(days/30)}mo`;
  return `${days}d`;
}
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const curMonth = today.getMonth();
const plantHues = ['#3E5641','#6B8068','#2B3C2E','#B8593A','#4A7FA8','#7B5EA7','#A08050','#5B7A4A'];
const plantTints = ['#A8B79B','#C3CBA8','#9BA68E','#E3B8A0','#B8D4E8','#C8B8D8','#D4C098','#B8C8A8'];

              <div style={{ fontSize:48, marginBottom:12 }}>🌿</div>

              <div style={{ fontSize:13, color:C.inkSoft, lineHeight:1.6 }}>Tap the <span style={{ fontWeight:600 }}>+</span> button below to add your first plant.</div>
            </div>
          </div>
        ) : (
          <>
            {tasks.length > 0 && (
              <div style={{ padding:'0 20px' }}>
                <div style={{ background:C.paper, borderRadius:22, padding:18, border:`0.5px solid ${C.line}` }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
                    <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:11, letterSpacing:1, textTransform:'uppercase', color:C.inkMute }}>Today & tomorrow</div>
                    <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:11, color:C.clay }}>{tasks.length.toString().padStart(2,'0')}</div>
                  </div>
                  {tasks.slice(0,5).map((t,i) => (
                    <TaskRow key={i} task={t} onClick={() => { setActivePlant(t.plant.id); go('detail'); }}/>
                  ))}
                </div>
              </div>
            )}
            <div style={{ padding:'28px 20px 0' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:12, padding:'0 4px' }}>
                <div style={{ fontSize:26, color:C.forestDeep }}>My plants</div>
                <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:11, color:C.inkMute, letterSpacing:1 }}>BY ROOM ↓</div>
              </div>
              {plants.map(p => (
                <PlantRowItem key={p.id} plant={p} onClick={() => { setActivePlant(p.id); go('detail'); }}/>
              ))}
            </div>
          </>
        )}
      </div>
    </ScreenShell>
  );
}

function TaskRow({ task, onClick }) {
  const iconMap = { water:Icon.drop, feed:Icon.leaf, rotate:Icon.rotate };
  const colorMap = { water:'#4A7FA8', feed:C.forest, rotate:C.clay };
  const label = { water:'Water', feed:'Feed', rotate:'Rotate' }[task.type];
  const overdue = daysUntil(task.next) < 0;
  return (
    <div onClick={onClick} style={{ display:'flex', alignItems:'center', gap:14, padding:'10px 0', borderTop:`0.5px solid ${C.lineSoft}`, cursor:'pointer' }}>
      <div style={{ width:36, height:36, borderRadius:999, background:colorMap[task.type]+'15', display:'flex', alignItems:'center', justifyContent:'center' }}>
        {iconMap[task.type](colorMap[task.type], 18)}
      </div>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:15, color:C.ink }}>{label} <span style={{ fontStyle:'italic', fontSize:17 }}>{task.plant.nick}</span></div>
        <div style={{ fontSize:11, color:C.inkMute, fontFamily:'"JetBrains Mono", monospace', marginTop:1 }}>{task.plant.name.toUpperCase()} · {task.plant.room}</div>
      </div>
      <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:11, color:overdue?C.clay:C.inkSoft, letterSpacing:0.5, textAlign:'right' }}>{dayLabel(task.next)}</div>
    </div>
  );
}

function PlantRowItem({ plant, onClick }) {
  const nextTask = [
    { type:'water', d:daysUntil(plant.water.next), icon:Icon.drop, c:'#4A7FA8' },
    { type:'feed', d:daysUntil(plant.feed.next), icon:Icon.leaf, c:C.forest },
    { type:'rotate', d:daysUntil(plant.rotate.next), icon:Icon.rotate, c:C.clay },
  ].sort((a,b) => a.d - b.d)[0];
  return (
    <div onClick={onClick} style={{ display:'flex', alignItems:'center', gap:14, padding:'14px 4px', borderBottom:`0.5px solid ${C.lineSoft}`, cursor:'pointer' }}>
      <PlantTile plant={plant} size={60} radius={14}/>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
          <div style={{ fontSize:22, color:C.ink, letterSpacing:-0.2 }}>{plant.nick}</div>
          <div style={{ fontSize:11, color:C.inkMute, fontFamily:'"JetBrains Mono", monospace', letterSpacing:0.5 }}>{plant.name.toUpperCase()}</div>
        </div>
        <div style={{ display:'flex', gap:8, alignItems:'center', marginTop:3 }}>
          <div style={{ fontSize:12, color:C.inkSoft, fontStyle:'italic' }}>{plant.room}</div>
          <div style={{ width:3, height:3, borderRadius:999, background:C.inkMute }}/>
          <div style={{ display:'flex', alignItems:'center', gap:4 }}>
            {nextTask.icon(nextTask.c, 12)}
            <div style={{ fontSize:11, color:nextTask.c, fontFamily:'"JetBrains Mono", monospace' }}>{dayLabel(plant[nextTask.type].next)}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── DETAIL Screen
function DetailScreen({ go, plant, onUpdatePlant, session }) {
  if (!plant) return null;
  const [justDone, setJustDone] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [lightboxPhoto, setLightboxPhoto] = useState(null);
  const photoInputRef = useRef();

  const tasks = [
    { type:'water', label:'Water', icon:Icon.drop, c:'#4A7FA8', d:plant.water, unit:'days' },
    { type:'feed', label:'Feed', icon:Icon.leaf, c:C.forest, d:plant.feed, unit:'days' },
    { type:'rotate', label:'Rotate', icon:Icon.rotate, c:C.clay, d:plant.rotate, unit:'days' },
    { type:'repot', label:'Repot', icon:Icon.pot, c:C.moss, d:plant.repot, unit:'days' },
  ];

  const markDone = (type) => {
    const updated = { ...plant, _rowId: plant._rowId };
    updated[type] = { ...plant[type], last:todayISO, next:addDays(todayISO, plant[type].every) };
    updated.log = [{ date:todayISO, type, note:'' }, ...(plant.log || [])];
    onUpdatePlant(updated);
    setJustDone(type);
    setTimeout(() => setJustDone(null), 2000);
  };

  const uploadPhoto = async (file) => {
    if (!file) return;
    setUploading(true);
    const ext = file.name.split('.').pop();
    const path = `${session.user.id}/${plant.id}/${Date.now()}.${ext}`;
    const { error: upErr } = await sb.storage.from('plant-photos').upload(path, file, { upsert: false });
    if (!upErr) {
      const { data: urlData } = sb.storage.from('plant-photos').getPublicUrl(path);
      const photoUrl = urlData.publicUrl;
      const updated = { ...plant, _rowId: plant._rowId };
      updated.photos = [{ url: photoUrl, date: todayISO }, ...(plant.photos || [])];
      updated.log = [{ date: todayISO, type: 'photo', note: '' }, ...(plant.log || [])];
      onUpdatePlant(updated);
    }
    setUploading(false);
  };

  const idx = plant.id ? parseInt(plant.id.replace('p','').replace(/\D/g,'0')) % plantHues.length : 0;
  const hue = plant.hue || plantHues[idx % plantHues.length];
  const tint = plant.tint || plantTints[idx % plantTints.length];
  const heroPhoto = plant.photos && plant.photos.length > 0 ? plant.photos[0].url : null;

  return (
    <ScreenShell bg={C.cream}>
      {/* Lightbox */}
      {lightboxPhoto && (
        <div onClick={() => setLightboxPhoto(null)} style={{ position:'absolute', inset:0, zIndex:200, background:'rgba(0,0,0,0.92)', display:'flex', alignItems:'center', justifyContent:'center', animation:'fernFade 0.2s ease' }}>
          <img src={lightboxPhoto} style={{ maxWidth:'95%', maxHeight:'90%', borderRadius:16, objectFit:'contain' }}/>
          <div style={{ position:'absolute', top:54, right:20 }}>
            <CircleBtn size={36} bg="rgba(255,255,255,0.15)" onClick={() => setLightboxPhoto(null)}>{Icon.close('#fff', 16)}</CircleBtn>
          </div>
        </div>
      )}

      {/* Hero */}
      <div style={{ height:300, position:'relative', flexShrink:0, background:heroPhoto?'#000':`repeating-linear-gradient(135deg, ${hue} 0 24px, ${tint} 24px 48px)` }}>
        {heroPhoto
          ? <img src={heroPhoto} style={{ width:'100%', height:'100%', objectFit:'cover', opacity:0.9 }}/>
          : <div style={{ position:'absolute', inset:0, background:`radial-gradient(circle at 35% 20%, rgba(255,255,255,0.25), transparent 60%)` }}/>
        }
        <div style={{ position:'absolute', top:52, left:20, right:20, display:'flex', justifyContent:'space-between' }}>
          <CircleBtn size={36} onClick={() => go('home')} bg="rgba(255,255,255,0.85)">{Icon.back(C.ink, 16)}</CircleBtn>
          <div style={{ display:'flex', gap:8 }}>
            <input ref={photoInputRef} type="file" accept="image/*" style={{ display:'none' }} onChange={e => uploadPhoto(e.target.files[0])}/>
            <CircleBtn size={36} bg="rgba(255,255,255,0.85)" onClick={() => photoInputRef.current.click()}>
              {uploading
                ? <div style={{ width:14, height:14, borderRadius:99, border:`2px solid ${C.forest}`, borderTopColor:'transparent', animation:'spin 0.8s linear infinite' }}/>
                : Icon.camera(C.ink, 16)
              }
            </CircleBtn>
          </div>
        </div>
        <div style={{ position:'absolute', bottom:16, left:22, right:22, color:'#fff' }}>
          <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:10, letterSpacing:2, opacity:0.85, textTransform:'uppercase' }}>{plant.species}</div>
          <div style={{ fontSize:48, lineHeight:1, letterSpacing:-1, marginTop:2 }}>{plant.nick}</div>
          <div style={{ marginTop:4, fontSize:13, fontStyle:'italic', opacity:0.92 }}>{plant.name} · {plant.room}</div>
        </div>
      </div>

      <div style={{ flex:1, overflow:'auto', paddingBottom:60 }}>
        {/* Care schedule */}
        <div style={{ padding:'20px 20px 0' }}>
          <SectionLabel>Care schedule</SectionLabel>
          <div style={{ background:C.paper, borderRadius:22, border:`0.5px solid ${C.line}`, overflow:'hidden' }}>
            {tasks.map((t, i) => {
              const overdue = daysUntil(t.d.next) < 0;
              const done = justDone === t.type;
              return (
                <div key={t.type} onClick={() => !done && markDone(t.type)} style={{ display:'flex', alignItems:'center', gap:14, padding:'14px 16px', borderBottom:i<tasks.length-1?`0.5px solid ${C.lineSoft}`:'none', cursor:done?'default':'pointer', background:done?C.forest+'10':'transparent', transition:'background 0.3s' }}>
                  <div style={{ width:38, height:38, borderRadius:10, background:done?C.forest+'25':t.c+'15', display:'flex', alignItems:'center', justifyContent:'center', transition:'background 0.3s' }}>
                    {done ? Icon.check(C.forest, 18) : t.icon(t.c, 18)}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14, fontWeight:500 }}>{t.label}</div>
                    <div style={{ fontSize:11, color:C.inkMute, fontFamily:'"JetBrains Mono", monospace', marginTop:2 }}>EVERY {t.d.every} {t.unit.toUpperCase()}</div>
                  </div>
                  <div style={{ textAlign:'right' }}>
                    {done ? (
                      <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:11, color:C.forest }}>SAVED ✓</div>
                    ) : (
                      <>
                        <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:13, color:overdue?C.clay:C.ink }}>{fmtDate(t.d.next).toUpperCase()}</div>
                        <div style={{ fontSize:10, color:overdue?C.clay:C.inkMute, marginTop:1, fontFamily:'"JetBrains Mono", monospace' }}>{dayLabel(t.d.next)}</div>
                      </>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ fontSize:11, color:C.inkMute, textAlign:'center', marginTop:8, fontStyle:'italic' }}>Tik op een taak om hem als gedaan te markeren</div>
        </div>

        {/* Conditions */}
        <div style={{ padding:'22px 20px 0' }}>
          <SectionLabel>Conditions</SectionLabel>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
            {[
              { label:'Light', value:plant.light },
              { label:'Humidity', value:plant.humidity },
              { label:'Water', value:`every ${plant.water.every}d` },
              { label:'With me', value:withMe(plant.acquired) },
            ].map(item => (
              <div key={item.label} style={{ background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:18, padding:14 }}>
                <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:10, color:C.inkMute, letterSpacing:1, textTransform:'uppercase', marginBottom:6 }}>{item.label}</div>
                <div style={{ fontSize:16, color:C.ink, lineHeight:1.2 }}>{item.value}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Photo gallery */}
        <div style={{ padding:'22px 20px 0' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:10, padding:'0 4px' }}>
            <SectionLabel>Photos</SectionLabel>
            {plant.photos && plant.photos.length > 0 && (
              <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:10, color:C.inkMute, letterSpacing:1 }}>{plant.photos.length} PHOTO{plant.photos.length>1?'S':''}</div>
            )}
          </div>
          <div style={{ display:'flex', gap:10, overflowX:'auto', paddingBottom:4 }}>
            {/* Upload tile */}
            <div onClick={() => photoInputRef.current.click()} style={{ width:110, height:130, borderRadius:16, flexShrink:0, border:`1.5px dashed ${C.line}`, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:8, cursor:'pointer', color:C.inkMute }}>
              {uploading
                ? <div style={{ width:20, height:20, borderRadius:99, border:`2px solid ${C.forest}`, borderTopColor:'transparent', animation:'spin 0.8s linear infinite' }}/>
                : <>
                    {Icon.camera(C.inkMute, 22)}
                    <div style={{ fontSize:10, fontFamily:'"JetBrains Mono", monospace', letterSpacing:1 }}>ADD</div>
                  </>
              }
            </div>
            {/* Photo tiles */}
            {(plant.photos || []).map((photo, i) => (
              <div key={i} onClick={() => setLightboxPhoto(photo.url)} style={{ width:110, height:130, borderRadius:16, flexShrink:0, overflow:'hidden', cursor:'pointer', position:'relative', border:`0.5px solid ${C.line}` }}>
                <img src={photo.url} style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
                <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'16px 6px 6px', background:'linear-gradient(to top, rgba(0,0,0,0.5), transparent)', fontFamily:'"JetBrains Mono", monospace', fontSize:8, color:'rgba(255,255,255,0.8)', letterSpacing:0.5 }}>
                  {fmtDate(photo.date).toUpperCase()}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Recent log */}
        {plant.log && plant.log.length > 0 && (
          <div style={{ padding:'22px 20px 0' }}>
            <SectionLabel>Recent</SectionLabel>
            <div style={{ background:C.paper, borderRadius:22, border:`0.5px solid ${C.line}`, overflow:'hidden' }}>
              {plant.log.slice(0,8).map((l, i) => {
                const iconMap = { water:Icon.drop, feed:Icon.leaf, rotate:Icon.rotate, repot:Icon.pot, photo:Icon.camera };
                const colorMap = { water:'#4A7FA8', feed:C.forest, rotate:C.clay, repot:C.moss, photo:C.inkSoft };
                const ic = iconMap[l.type] || Icon.check;
                const col = colorMap[l.type] || C.ink;
                return (
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 16px', borderBottom:i<Math.min(plant.log.length,8)-1?`0.5px solid ${C.lineSoft}`:'none' }}>
                    <div style={{ width:32, height:32, borderRadius:8, background:col+'15', display:'flex', alignItems:'center', justifyContent:'center' }}>{ic(col,14)}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, textTransform:'capitalize' }}>{l.type}{l.note ? ` — ${l.note}` : ''}</div>
                      <div style={{ fontSize:11, color:C.inkMute, fontFamily:'"JetBrains Mono", monospace', marginTop:1 }}>{fmtDate(l.date).toUpperCase()}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        <div style={{ height:20 }}/>
      </div>
    </ScreenShell>
  );
}

// ── ADD Screen
function AddScreen({ go, onAdd }) {
  const [step, setStep] = useState('search');
  const [query, setQuery] = useState('');
  const [picked, setPicked] = useState(null);
  const [nick, setNick] = useState('');
  const [room, setRoom] = useState('Living room');

  const results = useMemo(() => {
    if (!query) return PLANT_DB.slice(0, 30);
    const q = query.toLowerCase();
    return PLANT_DB.filter(p => p.name.toLowerCase().includes(q) || p.species.toLowerCase().includes(q)).slice(0,50);
  }, [query]);

  if (step === 'confirm' && picked) {
    return (
      <ScreenShell bg={C.cream}>
        <TopBar
          title="New plant"
          left={<CircleBtn size={32} onClick={() => setStep('search')}>{Icon.back(C.ink, 16)}</CircleBtn>}
          right={<CircleBtn size={32} onClick={() => go('home')}>{Icon.close(C.ink, 16)}</CircleBtn>}
        />
        <div style={{ flex:1, overflow:'auto', padding:'8px 20px 120px' }}>
          <div style={{ background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:22, padding:22, textAlign:'center' }}>
            <div style={{ width:100, height:100, margin:'0 auto 14px', borderRadius:22, background:`repeating-linear-gradient(135deg, ${C.forest} 0 12px, ${C.moss} 12px 24px)`, boxShadow:'inset 0 0 0 0.5px rgba(0,0,0,0.15)' }}/>
            <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:10, letterSpacing:1.5, color:C.inkMute, textTransform:'uppercase' }}>{picked.species}</div>
            <div style={{ fontSize:40, letterSpacing:-0.5, lineHeight:1, marginTop:4, color:C.forestDeep }}>{picked.name}</div>
          </div>
          <div style={{ marginTop:18 }}>
            <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:10, letterSpacing:1.5, color:C.inkMute, textTransform:'uppercase', marginBottom:8, padding:'0 4px' }}>Nickname</div>
            <input value={nick} onChange={e => setNick(e.target.value)} placeholder={`e.g. My ${picked.name}`} style={{ width:'100%', padding:'14px 16px', background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:14, fontSize:16, color:C.ink, outline:'none' }}/>
          </div>
          <div style={{ marginTop:14 }}>
            <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:10, letterSpacing:1.5, color:C.inkMute, textTransform:'uppercase', marginBottom:8, padding:'0 4px' }}>Room</div>
            <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
              {['Living room','Bedroom','Studio','Bathroom','Kitchen','Office','Balcony'].map(r => (
                <button key={r} onClick={() => setRoom(r)} style={{ padding:'8px 14px', borderRadius:99, border:`0.5px solid ${room===r?C.forestDeep:C.line}`, background:room===r?C.forestDeep:C.paper, color:room===r?C.cream:C.ink, cursor:'pointer', fontSize:13 }}>{r}</button>
              ))}
            </div>
          </div>
          <div style={{ marginTop:18 }}>
            <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:10, letterSpacing:1.5, color:C.inkMute, textTransform:'uppercase', marginBottom:8, padding:'0 4px' }}>Care plan</div>
            <div style={{ background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:22, padding:16 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
                {Icon.spark(C.clay, 12)}
                <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:10, letterSpacing:1.5, color:C.clay, textTransform:'uppercase' }}>Tuned for {MONTH_NAMES[curMonth]}</div>
              </div>
              {[
                { icon:Icon.drop('#4A7FA8',16), label:'Water', value:picked.water },
                { icon:Icon.leaf(C.forest,16), label:'Feed', value:`every ${picked.feedDays} days` },
                { icon:Icon.sun(C.clay,16), label:'Light', value:picked.light },
                { icon:Icon.rotate(C.moss,16), label:'Rotate', value:`every ${picked.rotateDays} days`, last:true },
              ].map((row, i, arr) => (
                <div key={row.label} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 0', borderBottom:row.last?'none':`0.5px solid ${C.lineSoft}` }}>
                  <div style={{ width:22, display:'flex', justifyContent:'center' }}>{row.icon}</div>
                  <div style={{ flex:1, fontSize:13, color:C.inkSoft }}>{row.label}</div>
                  <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:11, color:C.ink, textTransform:'uppercase', letterSpacing:0.5 }}>{row.value}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ height:20 }}/>
        </div>
        <div style={{ position:'absolute', left:0, right:0, bottom:0, padding:'14px 20px 34px', background:`linear-gradient(to top, ${C.cream} 60%, rgba(244,237,225,0))` }}>
          <button onClick={() => { onAdd({ ...picked, nick: nick || picked.name, room }); go('home'); }} style={{ width:'100%', height:54, borderRadius:16, border:'none', background:C.forestDeep, color:C.cream, cursor:'pointer', fontSize:20, letterSpacing:0.2 }}>Add to my garden</button>
        </div>
      </ScreenShell>
    );
  }

  return (
    <ScreenShell bg={C.cream}>
      <TopBar title="Add a plant" left={<CircleBtn size={32} onClick={() => go('home')}>{Icon.back(C.ink, 16)}</CircleBtn>}/>
      <div style={{ padding:'4px 20px 16px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:14, padding:'12px 14px' }}>
          {Icon.search(C.inkMute, 18)}
          <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Search 150+ species…" style={{ flex:1, border:'none', background:'transparent', outline:'none', fontSize:15, color:C.ink }}/>
          {query && <button onClick={() => setQuery('')} style={{ border:'none', background:'transparent', cursor:'pointer' }}>{Icon.close(C.inkMute, 14)}</button>}
        </div>
      </div>
      <div style={{ flex:1, overflow:'auto', padding:'0 20px 120px' }}>
        {!query && <SectionLabel>Popular houseplants</SectionLabel>}
        <div style={{ background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:22, overflow:'hidden' }}>
          {results.map((p, i) => (
            <div key={p.name} onClick={() => { setPicked(p); setNick(''); setStep('confirm'); }} style={{ padding:'14px 16px', display:'flex', alignItems:'center', gap:12, borderTop:i?`0.5px solid ${C.lineSoft}`:'none', cursor:'pointer' }}>
              <div style={{ width:44, height:44, borderRadius:10, flexShrink:0, background:`repeating-linear-gradient(${30+i*20}deg, ${plantHues[i%plantHues.length]} 0 6px, ${plantTints[i%plantTints.length]} 6px 12px)`, opacity:0.85 }}/>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:20, letterSpacing:-0.2, color:C.ink }}>{p.name}</div>

function CurveSVG({ data, color, current }) {
  const W=320, H=100, pad=8;
  const max = Math.max(...data) + 1;
  const pts = data.map((v,i) => [pad+(i*(W-pad*2))/(data.length-1), H-pad-(v/max)*(H-pad*2)]);
  const path = pts.reduce((acc,[x,y],i) => {
    if (i===0) return `M ${x} ${y}`;
    const [px,py] = pts[i-1];
    const cx = (px+x)/2;
    return `${acc} C ${cx} ${py} ${cx} ${y} ${x} ${y}`;
  },'');
  const area = `${path} L ${W-pad} ${H} L ${pad} ${H} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display:'block' }}>
      <defs><linearGradient id="sg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.35"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#sg)"/>
      <path d={path} stroke={color} strokeWidth="2" fill="none" strokeLinecap="round"/>
      {pts.map(([x,y],i) => (
        <g key={i}>
          {i===current && <><line x1={x} y1={y} x2={x} y2={H-4} stroke={color} strokeDasharray="2 3" strokeWidth="1"/><circle cx={x} cy={y} r="5" fill={C.paper} stroke={color} strokeWidth="2"/></>}
          {i!==current && <circle cx={x} cy={y} r="2" fill={color} opacity="0.5"/>}
        </g>
      ))}
    </svg>
  );
}

// ── CHAT Screen
function ChatScreen({ plants }) {
  const [msgs, setMsgs] = useState([
    { role:'ai', text: plants.length > 0
      ? `Hi — I watch over your ${plants.length} plant${plants.length===1?'':'s'}. Ask me about watering, care, leaves, repotting, or the season ahead.`
      : "Hi — I'm Fern, your plant care assistant. Add some plants to your garden and I'll help you take care of them. Or ask me anything about plants!" }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const scrollRef = useRef();

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [msgs, loading]);

  const send = async (text) => {
    const t = (text || input).trim();
    if (!t || loading) return;
    setInput('');
    setMsgs(m => [...m, { role:'me', text:t }]);
    setLoading(true);
    try {
      const plantContext = plants.length > 0
        ? `The user has these plants: ${plants.map(p => `${p.nick} (${p.name}, ${p.species})`).join(', ')}.`
        : "The user has no plants yet.";
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:300,
          system:`You are Fern, a calm expert plant-care assistant. ${plantContext} Current month: ${MONTH_NAMES[curMonth]}, spring in northern hemisphere. Be concise (2-3 short sentences), warm, practical. Never use emoji. Answer plant care questions only.`,
          messages:[{ role:"user", content:t }]
        })
      });
      const data = await response.json();
      const reply = data.content?.[0]?.text || "I couldn't reach the server. Try again in a moment.";
      setMsgs(m => [...m, { role:'ai', text:reply }]);
    } catch {
      setMsgs(m => [...m, { role:'ai', text:"I lost connection — try again in a moment." }]);
    }
    setLoading(false);
  };

  const suggestions = plants.length > 0
    ? [`When should I water my ${plants[0].nick}?`, 'Why are my leaves turning yellow?', 'How do I repot a plant?']
    : ['What is the easiest houseplant?', 'Which plants are good for low light?', 'How often should I fertilize?'];

  return (
    <ScreenShell bg={C.cream}>
      <TopBar title="Ask Fern" left={<div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:10, color:C.clay, letterSpacing:1 }}>AI</div>}/>
      <div ref={scrollRef} style={{ flex:1, overflow:'auto', padding:'0 20px 130px' }}>
        {msgs.length === 1 && (
          <div style={{ padding:'0 4px 16px' }}>
            <div style={{ fontSize:30, lineHeight:1.1, color:C.forestDeep, letterSpacing:-0.3 }}><em>Ask</em> anything about your plants.</div>
          </div>
        )}
        {msgs.map((m,i) => (
          <div key={i} style={{ display:'flex', justifyContent:m.role==='me'?'flex-end':'flex-start', marginBottom:10 }}>
            <div style={{ maxWidth:'82%', background:m.role==='me'?C.forestDeep:C.paper, color:m.role==='me'?C.cream:C.ink, border:m.role==='me'?'none':`0.5px solid ${C.line}`, borderRadius:m.role==='me'?'18px 18px 4px 18px':'18px 18px 18px 4px', padding:'12px 16px', fontSize:14, lineHeight:1.5 }}>{m.text}</div>
          </div>
        ))}
        {loading && (
          <div style={{ display:'flex', gap:4, padding:'8px 16px' }}>
            {[0,1,2].map(i => (<div key={i} style={{ width:6, height:6, borderRadius:99, background:C.inkMute, animation:`fernBlink 1.2s ease-in-out ${i*0.15}s infinite` }}/>))}
          </div>
        )}
        {msgs.length === 1 && (
          <div style={{ marginTop:10, display:'flex', flexDirection:'column', gap:8 }}>
            {suggestions.map(s => (
              <button key={s} onClick={() => send(s)} style={{ textAlign:'left', padding:'12px 16px', background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:14, fontSize:13, color:C.ink, fontStyle:'italic', cursor:'pointer' }}>"{s}"</button>
            ))}
          </div>
        )}
      </div>
      <div style={{ position:'absolute', left:0, right:0, bottom:0, padding:'10px 16px 100px', background:`linear-gradient(to top, ${C.cream} 30%, rgba(244,237,225,0))` }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:99, padding:'6px 6px 6px 18px', boxShadow:'0 4px 12px rgba(31,36,32,0.06)' }}>
          <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key==='Enter' && send()} placeholder="Ask about a plant…" style={{ flex:1, border:'none', background:'transparent', outline:'none', fontSize:14, color:C.ink, padding:'8px 0' }}/>
          <button onClick={() => send()} style={{ width:38, height:38, borderRadius:99, border:'none', background:C.forestDeep, color:C.cream, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>

function CalendarScreen({ plants, userId }) {
  const [shareOpen, setShareOpen] = useState(false);
  const year = today.getFullYear();

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const days = Array.from({ length:35 }, (_,i) => i);

  const events = plants.flatMap(p => [
    { date:p.water.next, type:'water', plant:p, color:'#4A7FA8' },
    { date:p.feed.next, type:'feed', plant:p, color:C.forest },
    { date:p.rotate.next, type:'rotate', plant:p, color:C.clay },
  ]).filter(e => {
    const d = new Date(e.date + 'T00:00:00');
    return d.getFullYear()===year && d.getMonth()===month;
  });

  const eventsByDay = {};
  events.forEach(e => {
    const d = parseInt(e.date.split('-')[2],10);
    eventsByDay[d] = eventsByDay[d] || [];
    eventsByDay[d].push(e);
  });

  const upcoming = plants.flatMap(p => [
    { plant:p, type:'water', next:p.water.next, color:'#4A7FA8' },
    { plant:p, type:'feed', next:p.feed.next, color:C.forest },
    { plant:p, type:'rotate', next:p.rotate.next, color:C.clay },
  ]).filter(e => daysUntil(e.next) >= 0).sort((a,b) => daysUntil(a.next)-daysUntil(b.next)).slice(0,6);

  return (
    <ScreenShell bg={C.cream}>
      <TopBar
        title="Calendar"
        left={<div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:11, color:C.inkMute, letterSpacing:1 }}>{MONTH_NAMES[month].toUpperCase()}</div>}

          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:4 }}>
            {days.map(i => {
              const day = i - firstDay + 1;
              const inMonth = day >= 1 && day <= daysInMonth;
              const isToday = day === today.getDate();
              const dayEvents = eventsByDay[day] || [];
              return (
                <div key={i} style={{ aspectRatio:'1', borderRadius:10, background:isToday?C.forestDeep:'transparent', color:isToday?C.cream:inMonth?C.ink:C.line, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-start', padding:'4px 0' }}>

    <div style={{ position:'fixed', inset:0, background:C.cream, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'0 32px', fontFamily:'-apple-system, "SF Pro", system-ui, sans-serif' }}>
      <SeasonalWash/>
      <div style={{ position:'relative', zIndex:1, width:'100%', maxWidth:360 }}>
        <div style={{ textAlign:'center', marginBottom:40 }}>
          <div style={{ width:72, height:72, borderRadius:20, margin:'0 auto 16px', background:`repeating-linear-gradient(135deg, ${C.forest} 0 10px, ${C.moss} 10px 20px)`, boxShadow:'0 8px 24px rgba(62,86,65,0.3)' }}/>
          <div style={{ fontSize:36, letterSpacing:-0.5, color:C.forestDeep, fontWeight:500 }}>Fern</div>
          <div style={{ fontSize:14, color:C.inkSoft, marginTop:4 }}>Your plant care companion</div>
        </div>
        {!sent ? (
          <div>
            <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:10, letterSpacing:1.5, color:C.inkMute, textTransform:'uppercase', marginBottom:8 }}>E-mailadres</div>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key==='Enter' && sendLink()} placeholder="jouw@email.com"
              style={{ width:'100%', padding:'16px', background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:16, fontSize:16, color:C.ink, outline:'none', marginBottom:12, boxSizing:'border-box' }}/>
            {error && <div style={{ fontSize:12, color:C.clay, marginBottom:10 }}>{error}</div>}
            <button onClick={sendLink} disabled={loading} style={{ width:'100%', height:54, borderRadius:16, border:'none', background:loading?C.moss:C.forestDeep, color:C.cream, cursor:loading?'default':'pointer', fontSize:18 }}>
              {loading ? 'Verzenden…' : 'Stuur inloglink'}
            </button>
            <div style={{ textAlign:'center', fontSize:12, color:C.inkMute, marginTop:16, lineHeight:1.6 }}>Je ontvangt een magische link per e-mail.<br/>Geen wachtwoord nodig.</div>
          </div>
        ) : (
          <div style={{ background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:22, padding:28, textAlign:'center' }}>
            <div style={{ fontSize:40, marginBottom:12 }}>📬</div>
            <div style={{ fontSize:20, color:C.forestDeep, marginBottom:8 }}>Check je inbox</div>
            <div style={{ fontSize:13, color:C.inkSoft, lineHeight:1.6 }}>We stuurden een link naar<br/><span style={{ fontWeight:600, color:C.ink }}>{email}</span>.<br/><br/>Tik op de link om in te loggen.</div>
            <button onClick={() => setSent(false)} style={{ marginTop:20, background:'transparent', border:'none', color:C.forest, fontSize:13, cursor:'pointer' }}>Andere e-mail gebruiken</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── MAIN APP
function App() {
  const [session, setSession] = useState(undefined);
  const [screen, setScreen] = useState('home');
  const [activePlantId, setActivePlantId] = useState(null);
  const [plantList, setPlantList] = useState([]);
  const [plantsLoaded, setPlantsLoaded] = useState(false);
  const [showInstall, setShowInstall] = useState(false);

  // Auth
  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => setSession(session));
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => setSession(session));
    return () => subscription.unsubscribe();
  }, []);

  // Load plants
  useEffect(() => {
    if (!session) { setPlantsLoaded(false); setPlantList([]); return; }
    sb.from('plants').select('*').eq('user_id', session.user.id).order('created_at', { ascending: false })
      .then(({ data, error }) => {
        if (!error && data) setPlantList(data.map(row => ({ ...row.data, _rowId: row.id })));
        setPlantsLoaded(true);
      });
  }, [session]);

  // Install banner
  useEffect(() => {
    if (!session) return;
    const shown = localStorage.getItem('fern_install_shown');
    if (!shown) {
      const t = setTimeout(() => { setShowInstall(true); localStorage.setItem('fern_install_shown','1'); }, 4000);
      return () => clearTimeout(t);
    }
  }, [session]);

  const go = (s) => setScreen(s);

  const addPlant = async (data) => {
    const id = 'p' + Date.now();
    const idx = plantList.length % plantHues.length;
    const newP = {
      id, name:data.name, nick:data.nick, species:data.species,
      room:data.room, acquired:todayISO,
      water:{ every:data.waterDays||7, last:todayISO, next:addDays(todayISO, data.waterDays||7) },
      feed:{ every:data.feedDays||30, last:todayISO, next:addDays(todayISO, data.feedDays||30) },
      rotate:{ every:data.rotateDays||14, last:todayISO, next:addDays(todayISO, data.rotateDays||14) },
      repot:{ every:365, last:todayISO, next:addDays(todayISO, 365) },
      light:data.light, humidity:data.humidity||'Medium',
      hue:plantHues[idx], tint:plantTints[idx],
      seasonCurve:data.curve || [3,3,4,6,8,10,11,10,8,6,4,3],
      log:[], health:95,
    };
    const { data: row, error } = await sb.from('plants').insert({ user_id: session.user.id, data: newP }).select().single();
    if (!error && row) {
      setPlantList(prev => [{ ...newP, _rowId: row.id }, ...prev]);
      setActivePlantId(id);
    }
  };

  const updatePlant = async (updated) => {
    // Always preserve _rowId in the list
    const existing = plantList.find(p => p.id === updated.id);
    const rowId = updated._rowId || (existing && existing._rowId);
    const withRowId = { ...updated, _rowId: rowId };
    setPlantList(prev => prev.map(p => p.id === updated.id ? withRowId : p));
    // Save to Supabase without _rowId in the data column
    if (rowId) {
      const { _rowId: _, ...plantData } = withRowId;
      await sb.from('plants').update({ data: plantData }).eq('id', rowId);
    }
  };

  // Loading auth
  if (session === undefined) {
    return <div style={{ position:'fixed', inset:0, background:C.cream, display:'flex', alignItems:'center', justifyContent:'center' }}><div style={{ width:32, height:32, borderRadius:99, border:`3px solid ${C.forest}`, borderTopColor:'transparent', animation:'spin 0.8s linear infinite' }}/></div>;
  }

  if (!session) return <LoginScreen/>;

  if (!plantsLoaded) {
    return <div style={{ position:'fixed', inset:0, background:C.cream, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12 }}><div style={{ width:32, height:32, borderRadius:99, border:`3px solid ${C.forest}`, borderTopColor:'transparent', animation:'spin 0.8s linear infinite' }}/><div style={{ fontSize:12, color:C.inkSoft, fontFamily:'"JetBrains Mono", monospace', letterSpacing:1 }}>LOADING YOUR GARDEN…</div></div>;
  }

  const activePlant = plantList.find(p => p.id === activePlantId);
  const showTabBar = screen !== 'detail' && screen !== 'add';

  const screenEl = (() => {
    switch(screen) {
      case 'home': return <HomeScreen go={go} setActivePlant={setActivePlantId} plants={plantList}/>;
      case 'detail': return <DetailScreen go={go} plant={activePlant} onUpdatePlant={updatePlant} session={session}/>;
      case 'add': return <AddScreen go={go} onAdd={addPlant}/>;
      case 'season': return <SeasonScreen plants={plantList}/>;
      case 'chat': return <ChatScreen plants={plantList}/>;
      case 'calendar': return <CalendarScreen plants={plantList} userId={session.user.id}/>;
      default: return <HomeScreen go={go} setActivePlant={setActivePlantId} plants={plantList}/>;
    }
  })();

  return (
    <div style={{ position:'fixed', inset:0, background:C.cream, overflow:'hidden' }}>
      {screenEl}
      {showTabBar && <TabBar screen={screen} go={go}/>}
      {showInstall && <InstallSheet onClose={() => setShowInstall(false)}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
