// ── Utils
const today = new Date();
const todayISO = today.toISOString().split('T')[0];

function addDays(iso, days) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}
function fmtDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function daysUntil(iso) {
  const t = new Date(todayISO + 'T00:00:00').getTime();
  const d = new Date(iso + 'T00:00:00').getTime();
  return Math.round((d - t) / 86400000);
}
function dayLabel(iso) {
  const n = daysUntil(iso);
  if (n < 0) return `${-n}d overdue`;
  if (n === 0) return 'today';
  if (n === 1) return 'tomorrow';
  return `in ${n}d`;
}
function withMe(iso) {
  const d1 = new Date(iso).getTime();
  const d2 = today.getTime();
  const days = Math.round((d2 - d1) / 86400000);
  if (days > 365) return `${(days/365).toFixed(1)}y`;
  if (days > 30) return `${Math.round(days/30)}mo`;
  return `${days}d`;
}
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const curMonth = today.getMonth();
const plantHues = ['#3E5641','#6B8068','#2B3C2E','#B8593A','#4A7FA8','#7B5EA7','#A08050','#5B7A4A'];
const plantTints = ['#A8B79B','#C3CBA8','#9BA68E','#E3B8A0','#B8D4E8','#C8B8D8','#D4C098','#B8C8A8'];

function CurveSVG({ data, color, current }) {
  const W=320, H=100, pad=8;
  const max = Math.max(...data) + 1;
  const pts = data.map((v,i) => [pad+(i*(W-pad*2))/(data.length-1), H-pad-(v/max)*(H-pad*2)]);
  const path = pts.reduce((acc,[x,y],i) => {
    if (i===0) return `M ${x} ${y}`;
    const [px,py] = pts[i-1];
    const cx = (px+x)/2;
    return `${acc} C ${cx} ${py} ${cx} ${y} ${x} ${y}`;
  },'');
  const area = `${path} L ${W-pad} ${H} L ${pad} ${H} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display:'block' }}>
      <defs><linearGradient id="sg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.35"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#sg)"/>
      <path d={path} stroke={color} strokeWidth="2" fill="none" strokeLinecap="round"/>
      {pts.map(([x,y],i) => (
        <g key={i}>
          {i===current && <><line x1={x} y1={y} x2={x} y2={H-4} stroke={color} strokeDasharray="2 3" strokeWidth="1"/><circle cx={x} cy={y} r="5" fill={C.paper} stroke={color} strokeWidth="2"/></>}
          {i!==current && <circle cx={x} cy={y} r="2" fill={color} opacity="0.5"/>}
        </g>
      ))}
    </svg>
  );
}

// ── CHAT Screen
function ChatScreen({ plants }) {
  const [msgs, setMsgs] = useState([
    { role:'ai', text: plants.length > 0
      ? `Hi — I watch over your ${plants.length} plant${plants.length===1?'':'s'}. Ask me about watering, care, leaves, repotting, or the season ahead.`
      : "Hi — I'm Fern, your plant care assistant. Add some plants to your garden and I'll help you take care of them. Or ask me anything about plants!" }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const scrollRef = useRef();

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [msgs, loading]);

  const send = async (text) => {
    const t = (text || input).trim();
    if (!t || loading) return;
    setInput('');
    setMsgs(m => [...m, { role:'me', text:t }]);
    setLoading(true);
    try {
      const plantContext = plants.length > 0
        ? `The user has these plants: ${plants.map(p => `${p.nick} (${p.name}, ${p.species})`).join(', ')}.`
        : "The user has no plants yet.";
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:300,
          system:`You are Fern, a calm expert plant-care assistant. ${plantContext} Current month: ${MONTH_NAMES[curMonth]}, spring in northern hemisphere. Be concise (2-3 short sentences), warm, practical. Never use emoji. Answer plant care questions only.`,
          messages:[{ role:"user", content:t }]
        })
      });
      const data = await response.json();
      const reply = data.content?.[0]?.text || "I couldn't reach the server. Try again in a moment.";
      setMsgs(m => [...m, { role:'ai', text:reply }]);
    } catch {
      setMsgs(m => [...m, { role:'ai', text:"I lost connection — try again in a moment." }]);
    }
    setLoading(false);
  };

  const suggestions = plants.length > 0
    ? [`When should I water my ${plants[0].nick}?`, 'Why are my leaves turning yellow?', 'How do I repot a plant?']
    : ['What is the easiest houseplant?', 'Which plants are good for low light?', 'How often should I fertilize?'];

  return (
    <ScreenShell bg={C.cream}>
      <TopBar title="Ask Fern" left={<div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:10, color:C.clay, letterSpacing:1 }}>AI</div>}/>
      <div ref={scrollRef} style={{ flex:1, overflow:'auto', padding:'0 20px 130px' }}>
        {msgs.length === 1 && (
          <div style={{ padding:'0 4px 16px' }}>
            <div style={{ fontSize:30, lineHeight:1.1, color:C.forestDeep, letterSpacing:-0.3 }}><em>Ask</em> anything about your plants.</div>
          </div>
        )}
        {msgs.map((m,i) => (
          <div key={i} style={{ display:'flex', justifyContent:m.role==='me'?'flex-end':'flex-start', marginBottom:10 }}>
            <div style={{ maxWidth:'82%', background:m.role==='me'?C.forestDeep:C.paper, color:m.role==='me'?C.cream:C.ink, border:m.role==='me'?'none':`0.5px solid ${C.line}`, borderRadius:m.role==='me'?'18px 18px 4px 18px':'18px 18px 18px 4px', padding:'12px 16px', fontSize:14, lineHeight:1.5 }}>{m.text}</div>
          </div>
        ))}
        {loading && (
          <div style={{ display:'flex', gap:4, padding:'8px 16px' }}>
            {[0,1,2].map(i => (<div key={i} style={{ width:6, height:6, borderRadius:99, background:C.inkMute, animation:`fernBlink 1.2s ease-in-out ${i*0.15}s infinite` }}/>))}
          </div>
        )}
        {msgs.length === 1 && (
          <div style={{ marginTop:10, display:'flex', flexDirection:'column', gap:8 }}>
            {suggestions.map(s => (
              <button key={s} onClick={() => send(s)} style={{ textAlign:'left', padding:'12px 16px', background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:14, fontSize:13, color:C.ink, fontStyle:'italic', cursor:'pointer' }}>"{s}"</button>
            ))}
          </div>
        )}
      </div>
      <div style={{ position:'absolute', left:0, right:0, bottom:0, padding:'10px 16px 100px', background:`linear-gradient(to top, ${C.cream} 30%, rgba(244,237,225,0))` }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:99, padding:'6px 6px 6px 18px', boxShadow:'0 4px 12px rgba(31,36,32,0.06)' }}>
          <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key==='Enter' && send()} placeholder="Ask about a plant…" style={{ flex:1, border:'none', background:'transparent', outline:'none', fontSize:14, color:C.ink, padding:'8px 0' }}/>
          <button onClick={() => send()} style={{ width:38, height:38, borderRadius:99, border:'none', background:C.forestDeep, color:C.cream, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke={C.cream} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
        </div>
      </div>
    </ScreenShell>
  );
}

// ── CALENDAR Screen
function CalendarScreen({ plants }) {
  const [shareOpen, setShareOpen] = useState(false);
  const year = today.getFullYear();
  const month = today.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const days = Array.from({ length:35 }, (_,i) => i);

  const events = plants.flatMap(p => [
    { date:p.water.next, type:'water', plant:p, color:'#4A7FA8' },
    { date:p.feed.next, type:'feed', plant:p, color:C.forest },
    { date:p.rotate.next, type:'rotate', plant:p, color:C.clay },
  ]).filter(e => {
    const d = new Date(e.date + 'T00:00:00');
    return d.getFullYear()===year && d.getMonth()===month;
  });

  const eventsByDay = {};
  events.forEach(e => {
    const d = parseInt(e.date.split('-')[2],10);
    eventsByDay[d] = eventsByDay[d] || [];
    eventsByDay[d].push(e);
  });

  const upcoming = plants.flatMap(p => [
    { plant:p, type:'water', next:p.water.next, color:'#4A7FA8' },
    { plant:p, type:'feed', next:p.feed.next, color:C.forest },
    { plant:p, type:'rotate', next:p.rotate.next, color:C.clay },
  ]).filter(e => daysUntil(e.next) >= 0).sort((a,b) => daysUntil(a.next)-daysUntil(b.next)).slice(0,6);

  return (
    <ScreenShell bg={C.cream}>
      <TopBar
        title="Calendar"
        left={<div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:11, color:C.inkMute, letterSpacing:1 }}>{MONTH_NAMES[month].toUpperCase()}</div>}
        right={<CircleBtn size={32} onClick={() => setShareOpen(true)}>{Icon.share(C.forest, 14)}</CircleBtn>}
      />
      <div style={{ flex:1, overflow:'auto', padding:'0 20px 130px' }}>
        <div style={{ background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:22, padding:16 }}>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:4, marginBottom:6 }}>
            {['S','M','T','W','T','F','S'].map((d,i) => (<div key={i} style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:10, color:C.inkMute, textAlign:'center', letterSpacing:1 }}>{d}</div>))}
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:4 }}>
            {days.map(i => {
              const day = i - firstDay + 1;
              const inMonth = day >= 1 && day <= daysInMonth;
              const isToday = day === today.getDate();
              const dayEvents = eventsByDay[day] || [];
              return (
                <div key={i} style={{ aspectRatio:'1', borderRadius:10, background:isToday?C.forestDeep:'transparent', color:isToday?C.cream:inMonth?C.ink:C.line, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-start', padding:'4px 0' }}>
                  <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:11 }}>{inMonth?day:''}</div>
                  {inMonth && dayEvents.length>0 && (
                    <div style={{ display:'flex', gap:2, marginTop:2 }}>
                      {dayEvents.slice(0,3).map((e,k) => (<div key={k} style={{ width:4, height:4, borderRadius:99, background:isToday?C.cream:e.color }}/>))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {upcoming.length > 0 && (
          <div style={{ marginTop:20 }}>
            <SectionLabel>Upcoming care</SectionLabel>
            <div style={{ background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:22, overflow:'hidden' }}>
              {upcoming.map((e,i) => (
                <div key={i} style={{ display:'flex', alignItems:'center', gap:14, padding:'12px 16px', borderBottom:i<upcoming.length-1?`0.5px solid ${C.lineSoft}`:'none' }}>
                  <div style={{ width:8, height:8, borderRadius:99, background:e.color, flexShrink:0 }}/>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14 }}>{e.type.charAt(0).toUpperCase()+e.type.slice(1)} <span style={{ fontStyle:'italic' }}>{e.plant.nick}</span></div>
                    <div style={{ fontSize:11, color:C.inkMute, fontFamily:'"JetBrains Mono", monospace', marginTop:1 }}>{e.plant.name.toUpperCase()}</div>
                  </div>
                  <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:11, color:C.inkSoft }}>{dayLabel(e.next)}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {plants.length === 0 && (
          <div style={{ marginTop:20, background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:22, padding:24, textAlign:'center' }}>
            <div style={{ fontSize:13, color:C.inkSoft, lineHeight:1.6 }}>Add plants to see care events in your calendar.</div>
          </div>
        )}
      </div>
      {shareOpen && <ShareSheet onClose={() => setShareOpen(false)}/>}
    </ScreenShell>
  );

// ── Login Screen
function LoginScreen() {
  const [email, setEmail] = useState('');
  const [sent, setSent] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const sendLink = async () => {
    if (!email.includes('@')) { setError('Vul een geldig e-mailadres in.'); return; }
    setLoading(true); setError('');
    const { error: err } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });
    setLoading(false);
    if (err) { setError(err.message); return; }
    setSent(true);
  };

  return (
    <div style={{ position:'fixed', inset:0, background:C.cream, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'0 32px', fontFamily:'-apple-system, "SF Pro", system-ui, sans-serif' }}>

      <div style={{ position:'relative', zIndex:1, width:'100%', maxWidth:360 }}>

          <div style={{ fontSize:14, color:C.inkSoft, marginTop:4 }}>Your plant care companion</div>
        </div>
        {!sent ? (
          <div>
            <div style={{ fontFamily:'"JetBrains Mono", monospace', fontSize:10, letterSpacing:1.5, color:C.inkMute, textTransform:'uppercase', marginBottom:8 }}>E-mailadres</div>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key==='Enter' && sendLink()} placeholder="jouw@email.com"
              style={{ width:'100%', padding:'16px', background:C.paper, border:`0.5px solid ${C.line}`, borderRadius:16, fontSize:16, color:C.ink, outline:'none', marginBottom:12, boxSizing:'border-box' }}/>
            {error && <div style={{ fontSize:12, color:C.clay, marginBottom:10 }}>{error}</div>}
            <button onClick={sendLink} disabled={loading} style={{ width:'100%', height:54, borderRadius:16, border:'none', background:loading?C.moss:C.forestDeep, color:C.cream, cursor:loading?'default':'pointer', fontSize:18 }}>
              {loading ? 'Verzenden…' : 'Stuur inloglink'}

            <div style={{ textAlign:'center', fontSize:12, color:C.inkMute, marginTop:16, lineHeight:1.6 }}>Je ontvangt een magische link per e-mail.<br/>Geen wachtwoord nodig.</div>
          </div>

            <div style={{ fontSize:40, marginBottom:12 }}>📬</div>
            <div style={{ fontSize:20, color:C.forestDeep, marginBottom:8 }}>Check je inbox</div>
            <div style={{ fontSize:13, color:C.inkSoft, lineHeight:1.6 }}>We stuurden een link naar<br/><span style={{ fontWeight:600, color:C.ink }}>{email}</span>.<br/><br/>Tik op de link om in te loggen.</div>
            <button onClick={() => setSent(false)} style={{ marginTop:20, background:'transparent', border:'none', color:C.forest, fontSize:13, cursor:'pointer' }}>Andere e-mail gebruiken</button>
          </div>
        )}

    </div>
  );
}

// ── MAIN APP
function App() {
  const [session, setSession] = useState(undefined);
  const [screen, setScreen] = useState('home');
  const [activePlantId, setActivePlantId] = useState(null);
  const [plantList, setPlantList] = useState([]);
  const [plantsLoaded, setPlantsLoaded] = useState(false);
  const [showInstall, setShowInstall] = useState(false);

  // Auth
  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => setSession(session));
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => setSession(session));
    return () => subscription.unsubscribe();
  }, []);

  // Load plants
  useEffect(() => {
    if (!session) { setPlantsLoaded(false); setPlantList([]); return; }
    sb.from('plants').select('*').eq('user_id', session.user.id).order('created_at', { ascending: false })
      .then(({ data, error }) => {
        if (!error && data) setPlantList(data.map(row => ({ ...row.data, _rowId: row.id })));
        setPlantsLoaded(true);
      });
  }, [session]);

  // Install banner
  useEffect(() => {
    if (!session) return;
    const shown = localStorage.getItem('fern_install_shown');
    if (!shown) {
      const t = setTimeout(() => { setShowInstall(true); localStorage.setItem('fern_install_shown','1'); }, 4000);
      return () => clearTimeout(t);
    }
  }, [session]);

  const go = (s) => setScreen(s);

  const addPlant = async (data) => {
    const id = 'p' + Date.now();
    const idx = plantList.length % plantHues.length;
    const newP = {
      id, name:data.name, nick:data.nick, species:data.species,
      room:data.room, acquired:todayISO,
      water:{ every:data.waterDays||7, last:todayISO, next:addDays(todayISO, data.waterDays||7) },
      feed:{ every:data.feedDays||30, last:todayISO, next:addDays(todayISO, data.feedDays||30) },
      rotate:{ every:data.rotateDays||14, last:todayISO, next:addDays(todayISO, data.rotateDays||14) },
      repot:{ every:365, last:todayISO, next:addDays(todayISO, 365) },
      light:data.light, humidity:data.humidity||'Medium',
      hue:plantHues[idx], tint:plantTints[idx],
      seasonCurve:data.curve || [3,3,4,6,8,10,11,10,8,6,4,3],
      log:[], health:95,
    };
    const { data: row, error } = await sb.from('plants').insert({ user_id: session.user.id, data: newP }).select().single();
    if (!error && row) {
      setPlantList(prev => [{ ...newP, _rowId: row.id }, ...prev]);
      setActivePlantId(id);
    }
  };

  const updatePlant = async (updated) => {
    const { _rowId, ...plantData } = updated;
    setPlantList(prev => prev.map(p => p.id === updated.id ? updated : p));
    if (_rowId) await sb.from('plants').update({ data: plantData }).eq('id', _rowId);
  };

  // Loading auth
  if (session === undefined) {
    return <div style={{ position:'fixed', inset:0, background:C.cream, display:'flex', alignItems:'center', justifyContent:'center' }}><div style={{ width:32, height:32, borderRadius:99, border:`3px solid ${C.forest}`, borderTopColor:'transparent', animation:'spin 0.8s linear infinite' }}/></div>;
  }

  if (!session) return <LoginScreen/>;

  if (!plantsLoaded) {
    return <div style={{ position:'fixed', inset:0, background:C.cream, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12 }}><div style={{ width:32, height:32, borderRadius:99, border:`3px solid ${C.forest}`, borderTopColor:'transparent', animation:'spin 0.8s linear infinite' }}/><div style={{ fontSize:12, color:C.inkSoft, fontFamily:'"JetBrains Mono", monospace', letterSpacing:1 }}>LOADING YOUR GARDEN…</div></div>;
  }

  const activePlant = plantList.find(p => p.id === activePlantId);
  const showTabBar = screen !== 'detail' && screen !== 'add';

  const screenEl = (() => {
    switch(screen) {
      case 'home': return <HomeScreen go={go} setActivePlant={setActivePlantId} plants={plantList}/>;
      case 'detail': return <DetailScreen go={go} plant={activePlant} onUpdatePlant={updatePlant}/>;
      case 'add': return <AddScreen go={go} onAdd={addPlant}/>;
      case 'season': return <SeasonScreen plants={plantList}/>;
      case 'chat': return <ChatScreen plants={plantList}/>;
      case 'calendar': return <CalendarScreen plants={plantList}/>;
      default: return <HomeScreen go={go} setActivePlant={setActivePlantId} plants={plantList}/>;
    }
  })();

  return (
    <div style={{ position:'fixed', inset:0, background:C.cream, overflow:'hidden' }}>
      {screenEl}
      {showTabBar && <TabBar screen={screen} go={go}/>}
      {showInstall && <InstallSheet onClose={() => setShowInstall(false)}/>}
    </div>
  );
}
